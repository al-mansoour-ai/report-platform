```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Report Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0F172A;
--card:#1E293B;
--primary:#334155;
--text:#E2E8F0;
--muted:#94A3B8;
--accent:#22C55E;
}
body{margin:0;font-family:'Cairo';background:var(--bg);color:var(--text);direction:rtl}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:15px}
input,textarea,select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;background:#020617;color:white}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:var(--primary);color:white;cursor:pointer}
small{color:var(--muted)}
.nav{display:flex;gap:10px}
.nav button{flex:1}
.step{display:none}
.step.active{display:block}
#result{display:none;background:#020617;padding:15px;border-radius:10px}
pre{white-space:pre-wrap;color:#38bdf8;direction:ltr}
.copy{background:var(--accent)}
</style>
</head>

<body>

<div class="container">

<h2>🏛️ AI Report Pro</h2>

<!-- STEP 1 -->
<div id="step1" class="step active">

<div class="card">
<h3>📊 نوع التقرير</h3>

<select id="type">
<option>Monitoring & Evaluation</option>
<option>Field Report</option>
<option>Training Report</option>
<option>Strategic Analysis</option>
<option>Financial Report</option>
<option>Humanitarian Report</option>
</select>

<p>🧠 وصف</p>
<textarea id="smartDesc"></textarea>

<button onclick="suggest()">✨ اقتراح</button>
</div>

<button onclick="next(2)">التالي</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<div class="card">

<h3>📁 البيانات</h3>

<input id="project" placeholder="اسم المشروع">
<input id="org" placeholder="الجهة">
<input id="donor" placeholder="الممول">
<input id="location" placeholder="الموقع">
<input id="date" placeholder="التاريخ">
<input id="beneficiaries" placeholder="عدد المستفيدين">

</div>

<div class="nav">
<button onclick="next(1)">رجوع</button>
<button onclick="next(3)">التالي</button>
</div>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<div class="card">

<h3>🧠 التحليل</h3>

<div id="questions"></div>

</div>

<div class="nav">
<button onclick="next(2)">رجوع</button>
<button onclick="generate()">🚀 توليد</button>
</div>
</div>

<!-- RESULT -->
<div id="result">
<pre id="output"></pre>

<button class="copy" onclick="copy()">📋 نسخ</button>
<button onclick="openGPT()">💬 ChatGPT</button>
<button onclick="openGemini()">🤖 Gemini</button>

<div class="card">
<h3>💰 الباقات</h3>
<p>10 تقارير = 10$</p>
<p>50 تقرير = 30$</p>
<p>غير محدود = 50$</p>
</div>

</div>

</div>

<script>

// التنقل
function next(step){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");

if(step==3) loadQuestions();
}

// اقتراح ذكي
function suggest(){
let t=document.getElementById("smartDesc").value;

if(t.includes("زيارة")) set("type","Field Report");
else if(t.includes("تقييم")) set("type","Monitoring & Evaluation");
else if(t.includes("تدريب")) set("type","Training Report");
}

// الأسئلة
function loadQuestions(){
let type=val("type");
let html="";

if(type=="Monitoring & Evaluation"){
html=`
<label>🎯 الهدف</label>
<small>مثال: تقييم أثر المشروع</small>
<textarea id="objective"></textarea>

<label>📊 النتائج</label>
<textarea id="findings"></textarea>

<label>⚠️ التحديات</label>
<textarea id="challenges"></textarea>

<label>💡 التوصيات</label>
<textarea id="recommendations"></textarea>
`;
}

else{
html=`
<label>🎯 الهدف</label>
<textarea id="objective"></textarea>

<label>📝 الملاحظات</label>
<textarea id="findings"></textarea>

<label>⚠️ التحديات</label>
<textarea id="challenges"></textarea>

<label>💡 التوصيات</label>
<textarea id="recommendations"></textarea>
`;
}

document.getElementById("questions").innerHTML=html;
}

// توليد + قفل
function generate(){

let device=localStorage.getItem("dev_id")||Math.random();
localStorage.setItem("dev_id",device);

let credits=localStorage.getItem("cr_"+device);
credits=credits?parseInt(credits):1;

if(credits<=0){
document.getElementById("result").style.display="block";
document.getElementById("output").innerHTML="🚫 انتهى الرصيد - تواصل واتساب";
return;
}

credits--;
localStorage.setItem("cr_"+device,credits);

let p=`
You are senior consultant.

Generate professional NGO report.

Project: ${val("project")}
Organization: ${val("org")}
Donor: ${val("donor")}
Location: ${val("location")}

Objective: ${val("objective")}
Findings: ${val("findings")}
Challenges: ${val("challenges")}
Recommendations: ${val("recommendations")}
`;

document.getElementById("output").innerText=p;
document.getElementById("result").style.display="block";
}

// أدوات
function val(id){return document.getElementById(id).value}
function set(id,v){document.getElementById(id).value=v}
function copy(){navigator.clipboard.writeText(output.innerText);alert("تم")}
function openGPT(){window.open("https://chat.openai.com")}
function openGemini(){window.open("https://gemini.google.com")}

</script>

</body>
</html>
```
