```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Report Studio</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{text-align:center}

/* box */
.box{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:15px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

#result{
display:none;
background:#020617;
padding:15px;
border-radius:10px;
margin-top:20px;
}

pre{
white-space:pre-wrap;
color:#38bdf8;
direction:ltr;
}

.copy{
background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🏛️ AI Report Studio</h1>

<!-- اختيار نوع التقرير -->
<div class="box">
<h3>📊 نوع التقرير</h3>
<select id="type">
<option>تقرير ميداني</option>
<option>تقرير تقييم</option>
<option>تقرير تدريبي</option>
<option>تقرير إنساني</option>
</select>
</div>

<!-- البيانات الأساسية -->
<div class="box">
<h3>📁 البيانات الأساسية</h3>

<label>اسم المشروع</label>
<input id="project">

<label>الجهة المنفذة</label>
<input id="org">

<label>التاريخ</label>
<input id="date">

<label>عدد المستفيدين</label>
<input id="beneficiaries">
</div>

<!-- وصف -->
<div class="box">
<h3>📝 وصف النشاط</h3>
<p style="font-size:12px;color:#aaa">مثال: زيارة ميدانية لمشروع مياه في عدن لتقييم الأداء</p>
<textarea id="desc"></textarea>
</div>

<button onclick="showQuestions()">التالي</button>

<!-- الأسئلة -->
<div id="questions"></div>

<!-- النتيجة -->
<div id="result">
<pre id="output"></pre>
<button class="copy" onclick="copy()">📋 نسخ</button>

<p style="font-size:12px;color:#ccc">
انسخ البرومبت ثم الصقه في ChatGPT للحصول على التقرير
</p>
</div>

</div>

<script>

function showQuestions(){
document.getElementById("questions").innerHTML = `
<div class="box">

<h3>🧠 التحليل</h3>

<p>📍 الموقع</p>
<small>مثال: عدن - خور مكسر</small>
<input id="q1">

<p>🎯 الهدف</p>
<small>مثال: تقييم جودة التنفيذ</small>
<input id="q2">

<p>📝 الملاحظات</p>
<small>مثال: تحسن الأداء لكن يوجد نقص في الموارد</small>
<textarea id="q3"></textarea>

<p>⚠️ التحديات</p>
<textarea id="q4"></textarea>

<p>💡 التوصيات</p>
<textarea id="q5"></textarea>

<button onclick="generate()">🚀 توليد البرومبت</button>

</div>
`;
}

function generate(){

let type = document.getElementById("type").value;
let project = document.getElementById("project").value;
let org = document.getElementById("org").value;
let date = document.getElementById("date").value;
let ben = document.getElementById("beneficiaries").value;
let desc = document.getElementById("desc").value;

let q1 = document.getElementById("q1").value;
let q2 = document.getElementById("q2").value;
let q3 = document.getElementById("q3").value;
let q4 = document.getElementById("q4").value;
let q5 = document.getElementById("q5").value;

let prompt = `
### ACT AS PROFESSIONAL REPORT WRITER

REPORT TYPE:
${type}

PROJECT:
${project}

ORGANIZATION:
${org}

DATE:
${date}

BENEFICIARIES:
${ben}

DESCRIPTION:
${desc}

LOCATION:
${q1}

OBJECTIVE:
${q2}

OBSERVATIONS:
${q3}

CHALLENGES:
${q4}

RECOMMENDATIONS:
${q5}

OUTPUT:
Generate a full professional report in formal Arabic including:
- Executive Summary
- Background
- Methodology
- Findings
- Challenges
- Recommendations
- Conclusion
`;

document.getElementById("output").innerText = prompt;
document.getElementById("result").style.display="block";
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("تم النسخ");
}

</script>

</body>
</html>
```
