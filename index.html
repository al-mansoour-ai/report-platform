```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Report Studio</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-weight:bold;
font-size:20px;
}

.header button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.vip{
background:gold;
color:black;
}

/* HERO */
.hero{
text-align:center;
margin-bottom:40px;
}

.hero h1{
font-size:28px;
margin-bottom:10px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:12px;
border:none;
margin-top:15px;
font-size:14px;
}

.main-btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* STEPS */
.steps{
display:flex;
justify-content:space-between;
margin:30px 0;
gap:10px;
}

.step{
background:#111827;
padding:10px;
border-radius:10px;
flex:1;
text-align:center;
font-size:12px;
}

/* PRICING */
.pricing{
display:flex;
gap:10px;
margin-top:30px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
flex:1;
text-align:center;
}

.pro{
border:2px solid gold;
}

/* QUESTIONS */
#questions{
margin-top:20px;
}

/* RESULT */
#result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:12px;
display:none;
}

pre{
white-space:pre-wrap;
color:#38bdf8;
direction:ltr;
}

.copy{
margin-top:10px;
width:100%;
padding:10px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.instructions{
font-size:12px;
color:#ccc;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<div class="logo">🏛️ AI Report</div>
<div>
<button>دخول</button>
<button class="vip">ترقية</button>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>منصة التقارير الذكية</h1>
<p>حوّل وصفك إلى تقرير احترافي خلال ثواني</p>

<textarea id="input" placeholder="مثال: زيارة مشروع مياه في عدن"></textarea>

<button class="main-btn" onclick="start()">🚀 ابدأ</button>
</div>

<!-- STEPS -->
<div class="steps">
<div class="step">1. وصف</div>
<div class="step">2. إجابة</div>
<div class="step">3. نسخ</div>
<div class="step">4. تقرير</div>
</div>

<!-- PRICING -->
<div class="pricing">
<div class="card">
<h4>تجربة</h4>
<p>$0</p>
</div>
<div class="card pro">
<h4>احترافي</h4>
<p>$19</p>
</div>
<div class="card">
<h4>مؤسسي</h4>
<p>$49</p>
</div>
</div>

<!-- QUESTIONS -->
<div id="questions"></div>

<!-- RESULT -->
<div id="result">
<pre id="output"></pre>
<button class="copy" onclick="copy()">📋 نسخ البرومبت</button>

<div class="instructions">
انسخ → افتح ChatGPT → الصق → احصل على تقرير كامل
</div>
</div>

</div>

<script>
function start(){
document.getElementById("questions").innerHTML = `
<p>📍 الموقع</p>
<input id="q1" placeholder="مثال: عدن">

<p>🎯 الهدف</p>
<input id="q2" placeholder="مثال: تقييم جودة المشروع">

<p>📝 الملاحظات</p>
<textarea id="q3" placeholder="مثال: تحسن الأداء"></textarea>

<button class="main-btn" onclick="generate()">توليد البرومبت</button>
`;
}

function generate(){
let text = document.getElementById("input").value;
let q1 = document.getElementById("q1").value;
let q2 = document.getElementById("q2").value;
let q3 = document.getElementById("q3").value;

let prompt = `
### ACT AS STRATEGIC EXPERT

INPUT:
${text}

LOCATION:
${q1}

OBJECTIVE:
${q2}

OBSERVATIONS:
${q3}

OUTPUT:
Generate a full professional report:
- Executive Summary
- Objectives
- Findings
- Risks
- Recommendations
- Conclusion

Write in formal Arabic.
`;

document.getElementById("output").innerText = prompt;
document.getElementById("result").style.display="block";
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("تم النسخ");
}
</script>

</body>
</html>
```
