<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة التقارير الذكية</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:850px;
margin:40px auto;
background:white;
color:#111;
border-radius:20px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#0f172a;
margin-bottom:20px;
}

select, input, textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
min-height:80px;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#0f172a,#2563eb);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.card{
background:#f8fafc;
padding:15px;
border-radius:12px;
margin-top:15px;
border-right:5px solid #2563eb;
}

.step{
background:#eef2ff;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:13px;
}

.result{
white-space:pre-line;
background:#0f172a;
color:#e2e8f0;
padding:15px;
border-radius:12px;
margin-top:15px;
font-size:13px;
}

.small{
font-size:12px;
color:#64748b;
}
</style>

</head>

<body>

<div class="container">

<h2>🧠 منصة التقارير الذكية</h2>

<div class="step">1️⃣ اختر نوع التقرير</div>

<select id="type" onchange="changeForm()">
<option value="">اختر نوع التقرير</option>
<option value="field">نزول ميداني</option>
<option value="training">تدريب</option>
<option value="evaluation">تقييم مشروع</option>
<option value="baseline">خط أساس</option>
</select>

<div id="formArea"></div>

<button onclick="generatePrompt()">🚀 توليد البرومبت</button>

<div class="result" id="output"></div>

</div>

<script>

function changeForm(){
let type=document.getElementById("type").value;
let f=document.getElementById("formArea");

if(type==="field"){
f.innerHTML=`
<div class="card">📍 بيانات المشروع</div>
<input id="project" placeholder="اسم المشروع">
<input id="location" placeholder="الموقع">

<div class="card">📝 الملاحظات</div>
<textarea id="obs" placeholder="ما الذي لاحظته؟"></textarea>

<div class="card">⚠️ التحديات</div>
<textarea id="challenges"></textarea>

<div class="card">💡 التوصيات</div>
<textarea id="reco"></textarea>
`;
}

else if(type==="training"){
f.innerHTML=`
<div class="card">🎓 التدريب</div>
<input id="project" placeholder="اسم التدريب">
<input id="location" placeholder="المكان">

<div class="card">📊 النتائج</div>
<textarea id="obs"></textarea>

<div class="card">⚠️ التحديات</div>
<textarea id="challenges"></textarea>

<div class="card">💡 التحسينات</div>
<textarea id="reco"></textarea>
`;
}

else if(type==="evaluation"){
f.innerHTML=`
<div class="card">📈 التقييم</div>
<input id="project" placeholder="اسم المشروع">

<textarea id="obs" placeholder="النتائج"></textarea>
<textarea id="challenges"></textarea>
<textarea id="reco"></textarea>
`;
}

else if(type==="baseline"){
f.innerHTML=`
<div class="card">📍 خط الأساس</div>
<input id="project">

<textarea id="obs"></textarea>
<textarea id="reco"></textarea>
`;
}
}

function generatePrompt(){

let type=document.getElementById("type").value;

let project=document.getElementById("project")?.value||"";
let location=document.getElementById("location")?.value||"";
let obs=document.getElementById("obs")?.value||"";
let ch=document.getElementById("challenges")?.value||"";
let reco=document.getElementById("reco")?.value||"";

let prompt=`أنت خبير تقارير في المنظمات الدولية.

اكتب تقرير احترافي وفق معايير M&E.

البيانات:
- المشروع: ${project}
- الموقع: ${location}
- الملاحظات: ${obs}
- التحديات: ${ch}
- التوصيات: ${reco}

اكتب تقرير رسمي مقسم ومنظم.`;

document.getElementById("output").innerText=prompt;

navigator.clipboard.writeText(prompt);
}

</script>

</body>
</html>
